<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>PaperLeak Academy</title>

</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                PaperLeak Academy
            </div>

            <div class="sub-title">
                Course Master Entry
            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Course ID</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text">
                </div>

            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Division Name</label>
                    <input type="text">
                </div>

            </div>

            <div class="full-width form-group">
                <label>Subject</label>
                <input type="text">
            </div>

            <div class="full-width form-group">
                <label>Duration (Months)</label>
                <input type="number">
            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>End Date</label>
                    <input type="date">
                </div>

            </div>

            <div class="full-width form-group">
                <label>Fee Amount</label>
                <input type="number">
            </div>

            <div class="full-width form-group">
                <label>Description</label>
                <textarea></textarea>
            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
