<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperLeak Academy</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #babee9;
        }

        .content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between; 
            gap: 15px;
            padding: 20px;
            background-color: #2e2761;
            color: white;
        }

        .logocontainer {
            display: flex;
            flex-direction: row;
            gap: 15px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .title h1 {
            font-size: 1rem;
        }

        .nav {
            display: flex;
            flex-direction: row;
            text-decoration: none;
            list-style-type: none;
            flex-wrap: wrap;
        }

        .nav li {
            margin-left: 2vw;
            font-size: 1.1em;
        }

        .nav li a {
            color: white;
            text-decoration: none;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        .form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 900px;
        }

        .form h2 {
            margin-bottom: 20px;
            text-align: left;
            
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            height: 5vh;
            padding: 8px;
        }

        .stackinputs {
            display: flex;
            gap: 20px;
        }

        .stackinputs .form-group {
            flex: 1;
        }

        .footer {
            background-color: #2e2761;
            color: white;
            text-align: center;
            padding: 25px;
        }

    </style>
</head>
<body>

    <div class="content">

        <div class="header">
            <div class="logocontainer">
                <div class="logo">
                    <img src="src/logo.png" alt="PaperLeak Logo">
                </div>

                <div class="title">
                    <h1>PaperLeak Academy</h1>
                </div>
            </div>

            <ul class="nav">
                <li><a href="#">About</a></li>
                <li><a href="#">Admissions</a></li>
                <li><a href="#">Achievements</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </div>


        <!------------------------------------------------------------------------>

        <!-- Paste the div form group outside stackinputs to occupy full space-->
        <!-- Paste it in stackinputs to stack the entries -->
        <div class="main">
            <div class="form">
                <h2>User Details</h2>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Course id">Course id</label>
                        <input type="text" id="name" placeholder="Enter Course id">
                    </div>

                    <div class="form-group">
                        <label for="Course Name">Course Name</label>
                        <input type="text" id="surname" placeholder="Enter Course Name">
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Class Name">Class Name</label>
                        <input type="text" id="name" placeholder="Enter Class Name">
                    </div>

                    <div class="form-group">
                        <label for="Division Name">Division Name</label>
                        <input type="text" id="surname" placeholder="Enter Division Name">
                    </div>
                </div>

                

                <div class="form-group">
                    <label for="Subject">Subject</label>
                    <input type="text" id="Subject" placeholder="Enter Subject Name">
                </div>

                <div class="form-group">
                    <label for="Duration Month">Duration Month</label>
                    <input type="text" id="Duration Month" placeholder="Enter Course Duration">
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Start Date">Start Date</label>
                        <input type="text" id="name" placeholder="Course Start Date">
                    </div>

                    <div class="form-group">
                        <label for="End Date">End Date</label>
                        <input type="text" id="surname" placeholder="Course End Date">
                    </div>
                </div>

                <div class="form-group">
                    <label for="Fee Amount">Fee Amount</label>
                    <input type="text" id="Duration Month" placeholder="Enter Fee Amount">
                </div>


               
            </div>
        </div>

        <!------------------------------------------------------------------------>


        <div class="footer">
            &copy; 2026 PaperLeak Academy | All rights reserved
        </div>

    </div>

</body>
</html>
