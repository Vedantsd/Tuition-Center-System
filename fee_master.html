<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperLeak Academy</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f7f5;
        }

        .content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between; 
            gap: 15px;
            padding: 20px;
            background-color: #2d4a3e;
            color: white;
        }

        .logocontainer {
            display: flex;
            flex-direction: row;
            gap: 15px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .title h1 {
            font-size: 2rem;
        }

        .nav {
            display: flex;
            flex-direction: row;
            text-decoration: none;
            list-style-type: none;
            flex-wrap: wrap;
        }

        .nav li {
            margin-left: 2vw;
            font-size: 1.1em;
        }

        .nav li a {
            color: white;
            text-decoration: none;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        .form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 900px;
        }

        .form h2 {
            margin-bottom: 20px;
            text-align: left;
            
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            height: 5vh;
            padding: 8px;
        }

        .stackinputs {
            display: flex;
            gap: 20px;
        }

        .stackinputs .form-group {
            flex: 1;
        }

        .footer {
            background-color: #2d4a3e;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .button-container button {
            background-color: #2d4a3e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

    </style>
</head>
<body>

    <div class="content">

        <div class="header">
            <div class="logocontainer">
                <div class="logo">
                    <img src="src/logo.png" alt="PaperLeak Logo">
                </div>

                <div class="title">
                    <h1>PaperLeak Academy</h1>
                </div>
            </div>

            <ul class="nav">
                <li><a href="#">About</a></li>
                <li><a href="#">Admissions</a></li>
                <li><a href="#">Achievements</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </div>


    <form>  
        <div class="main">
            <div class="form">
                <h2>User Details</h2>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Fee ID">Fee ID</label>
                        <input type="number" id="fee ID" placeholder="Enter your Fee ID" min="0">
                    </div>

                    <div class="form-group">
                        <label for="Course ID">Course ID</label>
                        <input type="number" id="course ID" placeholder="Enter your Course ID" min="0">
                    </div>
                </div>

                <div class="stackinputs">
                <div class="form-group">
                    <label for="Registration Fee">Registration Fee</label>
                    <input type="number" id="registration fee" placeholder="Enter registration fee" min="0">
                </div>

                <div class="form-group">
                    <label for="Tuition Fee">Tuition Fee</label>
                    <input type="number" id="tuition fee" placeholder="Enter tuition fee" min="0">
                </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Exam Fee">Exam Fee</label>
                        <input type="number" id="exam fee" placeholder="Enter exam fee" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="Material Fee">Material Fee</label>
                        <input type="number" id="material fee" placeholder="Enter material fee" min="0">
                    </div>
                    </div>

                    <div class="form-group">
                        <label for="Total Fee">Total Fee</label>
                        <input type="number" id="total fee" placeholder="Enter total fee" min="0">
                    </div>

                     <div class="button-container">
                        <button type="submit">Submit Fee</button>
                    </div>
                </form>


                </div>

            </div>
        </div>

        <!------------------------------------------------------------------------>


        <div class="footer">
            &copy; 2026 PaperLeak Academy | All rights reserved
        </div>

    </div>

</body>
</html>
