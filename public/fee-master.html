<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Fee Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="FeeID">
                    Fee ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique fee ID.</span>
                    </span>
                </label>
                <input type="number" id="FeeID" min="0" required>

                <div></div>

                <label for="CourseID">
                    Course ID
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the associated course ID.</span>
                    </span>
                </label>
                <input type="number" id="CourseID" min="0">

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="RegistrationFee">
                    Registration Fee <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the registration fee amount.</span>
                    </span>
                </label>
                <input type="number" id="RegistrationFee" min="0" required>

                <div></div>

                <label for="TuitionFee">
                    Tuition Fee <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the tuition fee amount.</span>
                    </span>
                </label>
                <input type="number" id="TuitionFee" min="0" required>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="ExamFee">
                    Exam Fee
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the examination fee, if applicable.</span>
                    </span>
                </label>
                <input type="number" id="ExamFee" min="0">

                <div></div>

                <label for="MaterialFee">
                    Material Fee
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the study material fee, if applicable.</span>
                    </span>
                </label>
                <input type="number" id="MaterialFee" min="0">

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="TotalFee">
                    Total Fee <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the total fee amount.</span>
                    </span>
                </label>
                <input type="number" id="TotalFee" min="0" required>

                <div></div>

                <!-- Empty right side for layout consistency -->
                <label></label>
                <input type="text" disabled style="visibility:hidden;">

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
