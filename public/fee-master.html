<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>PaperLeak Academy</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">
            <div class="main-title">
                PaperLeak Academy
            </div>

            <div class="sub-title">
                Fee Master
            </div>


            <div class="stackinputs">

                <div class="form-group">
                    <label>Fee ID</label>
                    <input type="number" min="0">
                </div>

                <div class="form-group">
                    <label>Course ID</label>
                    <input type="number" min="0">
                </div>

            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Registration Fee</label>
                    <input type="number" min="0">
                </div>

                <div class="form-group">
                    <label>Tuition Fee</label>
                    <input type="number" min="0">
                </div>

            </div>

                        <div class="stackinputs">

                <div class="form-group">
                    <label>Exam Fee</label>
                    <input type="number" min="0">
                </div>

                <div class="form-group">
                    <label>Material Fee</label>
                    <input type="number" min="0">
                </div>

            </div>

            <div class="full-width form-group">
                <label>Total Fee</label>
                <input type="number" min="0">
            </div>


            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
