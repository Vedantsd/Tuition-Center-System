<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fee Master</title>

<link rel="stylesheet" href="styles/reuseable-design.css">

<style>
/* ===== GLOBAL FONT UPGRADE ===== */
body {
    font-size: 18px;
    font-family: Arial, sans-serif;
}

label {
    font-size: 16px;
    font-weight: 600;
}

input, select {
    font-size: 16px;
    padding: 8px;
}

.main-title {
    font-size: 30px;
    font-weight: bold;
}

.sub-title {
    font-size: 22px;
    font-weight: 600;
}

/* ===== FEE MASTER PAGE-ONLY OVERRIDE =====
   Scoped to .fee-master-page so it cannot affect any other form
   that shares reuseable-design.css. Widens the label column just
   enough that "Registration Fee *" plus the info icon fit on one
   line, instead of the icon wrapping onto its own line below. */
.fee-master-page .stackinputs {
    grid-template-columns: 210px minmax(0,1fr) 60px 210px minmax(0,1fr);
}

/* ===== REQUIRED FIELD VALIDATION (Fee Master only) =====
   Same visual pattern as Assignment Master / Users: red border +
   small red message under the field, shown when a required field
   is left empty, removed as soon as it's filled in. Scoped entirely
   to this page's own classes so it can't affect other forms. */
.fee-field-wrapper {
    position: relative;
    width: 100%;
}

.fee-input-error {
    border: 1.5px solid #d93025 !important;
}

.fee-field-error-message {
    position: absolute;
    left: 0;
    top: calc(100% + 3px);
    color: #d93025;
    font-size: 12px;
    white-space: nowrap;
    margin: 0;
    display: block;
}
</style>

</head>

<body>
    <div class="body">



<div class="content">

    <div class="main">

        <div class="form fee-master-page">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Fee Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="FeeID">
                    Fee ID <span class="required">*</span>
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Auto-generated. Type an existing ID and click Find to search.</span>
                    </span>
                </label>

                <div style="display:flex; gap:10px;">
                    <input type="number" id="FeeID" min="0" required class="short-input" readonly>

                    <div class="segmented-toggle">
                        <button type="button" id="newBtn" class="segment-btn active">
                            New
                        </button>
                        <button type="button" id="findBtn" class="segment-btn">
                            Find
                        </button>
                    </div>
                </div>

                <div></div>

                <label for="CourseID">
                    Course ID <span class="required">*</span>
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Select the course by name — Course ID fills automatically</span>
                    </span>
                </label>

                <div class="custom-select-wrapper" id="courseSelectWrapper">
                    <div class="custom-select-display" id="courseSelectDisplay" tabindex="0">
                        <span class="placeholder-text" id="courseSelectText">-- Select Course --</span>
                    </div>
                    <div class="custom-select-list" id="courseSelectList"></div>
                    <input type="hidden" id="CourseID" value="">
                </div>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="RegistrationFee">
                    Registration Fee <span class="required">*</span>
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">One-time registration fee</span>
                    </span>
                </label>

                <div class="fee-field-wrapper">
                    <input type="number" id="RegistrationFee" min="0" step="0.01" required>
                </div>

                <div></div>

                <label for="TuitionFee">
                    Tuition Fee <span class="required">*</span>
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Monthly/total tuition fee</span>
                    </span>
                </label>

                <div class="fee-field-wrapper">
                    <input type="number" id="TuitionFee" min="0" step="0.01" required>
                </div>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="ExamFee">
                    Exam Fee
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Optional exam fee</span>
                    </span>
                </label>

                <input type="number" id="ExamFee" min="0" step="0.01">

                <div></div>

                <label for="MaterialFee">
                    Material Fee
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Books / study material cost</span>
                    </span>
                </label>

                <input type="number" id="MaterialFee" min="0" step="0.01">

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="TotalFee">
                    Total Fee <span class="required">*</span>
                    <span class="info-icon">
                        ⓘ
                        <span class="tooltip">Total = all fees combined (auto-calculated)</span>
                    </span>
                </label>

                <input type="number" id="TotalFee" min="0" step="0.01" readonly class="normal-readonly">

                <div></div>

                <label></label>
                <input type="text" disabled style="visibility:hidden;">

            </div>

            <!-- Buttons -->
<div class="button-container">

    <button type="button" class="btn save-btn">
        Save
    </button>

    <button type="button" id="prevBtn" class="btn nav-btn">
        ◀
    </button>

    <button type="button" id="nextBtn" class="btn nav-btn">
        ▶
    </button>

    <button type="button" class="btn exit-btn">
        Exit
    </button>

</div>

            </div>

        </div>

    </div>

</div>
</div>
<!-- JS -->
<script src="js/db-api.js"></script>
<script src="js/fee-master.js"></script>

</body>
</html>
