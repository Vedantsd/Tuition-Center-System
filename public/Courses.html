<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>


<Style>

    .toggle-buttons{

    display:flex;
    border:2px solid #1a73e8;
    border-radius:10px;
    overflow:hidden;
    width:130px;

}

.toggle-btn{

    flex:1;
    padding:10px 0;
    border:none;
    background:white;
    color:#1a73e8;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;

}

.toggle-btn.active{

    background:#1a73e8;
    color:white;

} 

 
    /* --- Validation styles --- */

    .field-wrapper {
        position: relative;
        display: block;
    }

    .input-error {
        border: 1.5px solid #e53935 !important;
    }

    .field-error-text {
        position: absolute;
        top: 100%;
        left: 0;
        color: #e53935;
        font-size: 12px;
        margin-top: 3px;
        white-space: nowrap;
        display: none;
    }

    .field-error-text.show {
        display: block;
    }

    /*================ INFO MODAL =================*/

.info-icon{
    cursor: pointer;
}

.modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-overlay.show{
    display: flex;
}

.modal-box{
    background: #fff;
    border-radius: 16px;
    padding: 30px 35px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,.25);
}

.modal-box p{
    font-size: 17px;
    color: #333;
    margin-bottom: 20px;
}

/* --- Confirmation Modal --- */

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-overlay.show {
        display: flex;
    }

    .modal-box {
        background: white;
        padding: 30px 35px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 320px;
    }

    .modal-box p {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #222;
    }

    .modal-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .confirm-yes-btn {
        background: #1a73e8;
        color: white;
        border: none;
        padding: 8px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .confirm-no-btn {
        background: #e0e0e0;
        color: #333;
        border: none;
        padding: 8px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

</Style>
</head>

<body>
<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Course Master Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="CourseID">
                    Course ID <span class="required">*</span>
                    <span class="info-icon" data-info="Course ID should be unique.">ⓘ</span>
                </label>

                <div class="id-find-group">
                    <input type="number" id="CourseID" class="short-input">
                    <div class="toggle-buttons">

                        <button type="button"
                                id="newBtn"
                                class="toggle-btn active">
                            New
                        </button>

                        <button type="button"
                                id="findBtn"
                                class="toggle-btn">
                            Find
                        </button>

                    </div>
                </div>

                <div></div>

                <label for="CourseName">
                    Course Name <span class="required">*</span>
                    <span class="info-icon" data-info="Official Course Name">ⓘ</span>
                </label>
                <input type="text" id="CourseName" required>
                


            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="ClassName">
                    Class Name <span class="required">*</span>
                    <span class="info-icon" data-info="ClassName with Branch (Ex.FY IT).">ⓘ</span>
                </label>
                <input type="text" id="ClassName" required>
                

                <div></div>

                <label for="DivisionName">
                    Division Name
                </label>
                
                <input type="text" id="DivisionName" class="short-input">

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="Subject">
                    Subject <span class="required">*</span>
                    <span class="info-icon" data-info="Subject Under Course (Multiple Subject with comma).">ⓘ</span>
                </label>
                <input type="text" id="Subject" required>
                

                <div></div>

                <label for="Duration">
                    Duration(Months)<span class="required">*</span>
                    
                    
                </label>
                <!-- <input type="number" id="Duration" required> -->
                <input type="number" id="Duration" class="short-input" required>
                

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="StartDate">
                    Start Date <span class="required">*</span>
                    
                    
                </label>
                <!-- <input type="date" id="StartDate" required> -->
                <input type="date" id="StartDate" class="short-input" required>
                

                <div></div>

                <label for="EndDate">
                    End Date <span class="required">*</span>
                    
                    
                </label>
                <!-- <input type="date" id="EndDate" required> -->
                <input type="date" id="EndDate" class="short-input" required>
                

            </div>

            <!-- Row 5 -->
            <div class="stackinputs">

                <label for="FeeAmount">
                    Fee Amount <span class="required">*</span>
                    
                    
                </label>
                <!-- <input type="number" id="FeeAmount" required> -->
                <input type="number" id="FeeAmount" class="short-input" required>
                

                <div></div>

                
            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button id="previousBtn" class="btn nav-btn">◀</button>
                <button id="nextBtn" class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

            <div id="confirmModal" class="modal-overlay">
                <div class="modal-box">
                    <p id="confirmMessage">Are you sure you want to update this record?</p>
                    <div class="modal-buttons">
                        <button id="confirmYesBtn" class="btn confirm-yes-btn">Yes</button>
                        <button id="confirmNoBtn" class="btn confirm-no-btn">No</button>
                    </div>
                </div>
            </div>

        

        </div>

    </div>

</div>
</div>

<script src="js/db-api.js"></script>
<script src="js/courses.js"></script>

<div class="modal-overlay" id="infoModalOverlay">
    <div class="modal-box">
        <p id="infoModalText"></p>
        <button type="button" id="infoModalClose" class="btn nav-btn">Close</button>
    </div>
</div>

</body>
</html>
