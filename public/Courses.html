<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Course Master Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="CourseID">
                    Course ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique course ID.</span>
                    </span>
                </label>
                <input type="number" id="CourseID" required>

                <div></div>

                <label for="CourseName">
                    Course Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the course name.</span>
                    </span>
                </label>
                <input type="text" id="CourseName" required>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="ClassName">
                    Class Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the class name.</span>
                    </span>
                </label>
                <input type="text" id="ClassName" required>

                <div></div>

                <label for="DivisionName">
                    Division Name
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the division name.</span>
                    </span>
                </label>
                <input type="text" id="DivisionName">

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="Subject">
                    Subject <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the subject name.</span>
                    </span>
                </label>
                <input type="text" id="Subject" required>

                <div></div>

                <label for="Duration">
                    Duration (Months) <span class="required">*</span>
                </label>
                <input type="number" id="Duration" required>

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="StartDate">
                    Start Date <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the course start date.</span>
                    </span>
                </label>
                <input type="date" id="StartDate" required>

                <div></div>

                <label for="EndDate">
                    End Date <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the course end date.</span>
                    </span>
                </label>
                <input type="date" id="EndDate" required>

            </div>

            <!-- Row 5 -->
            <div class="stackinputs">

                <label for="FeeAmount">
                    Fee Amount <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the total course fee.</span>
                    </span>
                </label>
                <input type="number" id="FeeAmount" required>

                <div></div>

                <label for="Description">
                    Description
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter additional details about the course.</span>
                    </span>
                </label>
                <input type="text" id="Description">

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
