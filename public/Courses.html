<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>

</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Course Master Entry
            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Course ID <span class="required">*</span></label>
                    <input type="number" required>
                </div>

                <div class="form-group">
                    <label>Course Name <span class="required">*</span></label>
                    <input type="text" required>
                </div>

            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Class Name <span class="required">*</span></label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Division Name</label>
                    <input type="text">
                </div>

            </div>

            <div class="full-width form-group">
                <label>Subject <span class="required">*</span></label>
                <input type="text" required>
            </div>

            <div class="full-width form-group">
                <label>Duration (Months) <span class="required">*</span></label>
                <input type="number"required>
            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Start Date <span class="required">*</span></label>
                    <input type="date" required>
                </div>

                <div class="form-group">
                    <label>End Date <span class="required">*</span></label>
                    <input type="date" required>
                </div>

            </div>

            <div class="full-width form-group">
                <label>Fee Amount <span class="required">*</span></label>
                <input type="number" required>
            </div>

            <div class="full-width form-group">
                <label>Description</label>
                <textarea></textarea>
            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
