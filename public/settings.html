<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>
</head>

<body>

    <div class="body">
        <div class="content">

            <div class="main">

                <div class="form">

                    <div class="main-title">
                        Tuition Centre System
                    </div>

                    <div class="sub-title">
                        Settings Master Entry
                    </div>

                    <div id="statusMessage" class="status-message"></div>

                    <!-- Row 1 -->
                    <div class="stackinputs">

                        <label for="SettingID">
                            Setting ID <span class="required">*</span>
                            <span class="info-icon">ⓘ
                                <span class="tooltip">Enter a unique setting ID.</span>
                            </span>
                        </label>

                        <div class="id-find-group">
                            <input type="number" id="SettingID" class="short-input" readonly required>

                            <div class="mode-toggle" id="modeToggle">
                                <button type="button" class="mode-btn active" id="newModeBtn">New</button>
                                <button type="button" class="mode-btn" id="findModeBtn">Find</button>
                            </div>
                        </div>

                        <div></div>

                        <label for="SettingName">
                            Setting Name <span class="required">*</span>
                            <span class="info-icon">ⓘ
                                <span class="tooltip">Enter the setting name.</span>
                            </span>
                        </label>

                        <div class="assignment-field-wrapper">
                            <input type="text" id="SettingName" required>
                        </div>

                    </div>

                    <!-- Row 2 -->
                    <div class="stackinputs">

                        <label for="SettingValue">
                            Setting Value <span class="required">*</span>
                            <span class="info-icon">ⓘ
                                <span class="tooltip">Enter the setting value.</span>
                            </span>
                        </label>

                        <div class="assignment-field-wrapper">
                            <input type="text" id="SettingValue" required>
                        </div>

                    </div>

                    <div class="button-container">
                        <button type="button" class="btn save-btn">Save</button>
                        <button type="button" class="btn nav-btn prevButton">◀</button>
                        <button type="button" class="btn nav-btn nextButton">▶</button>
                        <button type="button" class="btn exit-btn">Exit</button>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="js/db-api.js"></script>
    <script src="js/settings.js"></script>

</body>

</html>
