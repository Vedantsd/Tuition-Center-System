<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">
            <div class="main-title">
                Tuition Centre System
            </div>

            <!-- FORM NAME -->
            <div class="sub-title">
                Users Details
            </div>

            <div id="statusMessage" class="status-message"></div>
           

            <div class="stackinputs">
                    <div class="form-group">
                        <label for="User ID">User ID <span class="required">*</span></label>
                        <input type="number" id="User ID" required>
                    </div>

                    <div class="form-group">
                        <label for="User Type">User Type <span class="required">*</span></label>

                        <select id="User Type" required
                            style="width: 500px; height: 50px; padding: 10px; font-size: 18px; border-radius: 10px;">
                            <option value="">--Select User Type--</option>
                        </select>
                    </div>
                </div>
                
                <div class="stackinputs">
                    <div class="form-group">
                        <label for="First Name">First Name <span class="required">*</span></label>
                        <input type="text" id="First Name" required >
                    </div>

                    <div class="form-group">
                        <label for="Last Name">Last Name <span class="required">*</span></label>
                        <input type="text" id="Last Name"  required>
                    </div>
                </div>
                
                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Mobile No.">Mobile No.</label>
                        <input type="number" id="Mobile No." >
                    </div>

                    <div class="form-group">
                        <label for="Email">Email <span class="required">*</span></label>
                        <input type="email" id="Email"  required>
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Password">Password <span class="required">*</span></label>
                        <input type="password" id="Password" requried>
                    </div>

                    <div class="form-group">
                        <label for="DOB">DOB <span class="required">*</span></label>
                        <input type="date" id="DOB" requried>
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Address">Address</label>
                        <input type="text" id="Address" >
                    </div>

                    <div class="form-group">
                        <label for="Qualification">Qualification</label>
                        <input type="text" id="Qualification" >
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Joining Date">Joining Date</label>
                        <input type="date" id="Joining Date" >
                    </div>

                    <div class="form-group">
                        <label for="Gender">Gender</label>
                        <select name="Gender" id="Gender" style="width: 500px; height: 50px; padding: 10px; font-size: 18px; border-radius: 10px;">
                            <option value="">--Select--</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                </div>


            <div class="button-container">
                <button type="button" class="btn save-btn">
                    Save
                </button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

<script src="js/db-api.js"></script>
<script src="js/users.js"></script>
</body>
</html>
