<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Users Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">
                <label for="UserID">User ID <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Enter a unique numerical value</span>
                    </span>
                </label>

                <input type="number" id="UserID" required> 

                <label for="UserType">User Type <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Select the appropriate user type from the list.</span>
                    </span>
                </label>
                <select id="UserType" required>
                    <option value="">--Select User Type--</option>
                </select>
            </div>

            <!-- Row 2 -->
            <div class="stackinputs">
                <label for="FirstName">First Name <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Please enter a valid first name using only letters and spaces.</span>
                    </span>
                </label>
                <input type="text" id="FirstName" required>

                <label for="LastName">Last Name <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Please enter a valid last name using only letters and spaces.</span>
                    </span>
                </label>
                <input type="text" id="LastName" required>
            </div>

            <!-- Row 3 -->
            <div class="stackinputs">
                <label for="MobileNo">Mobile No.</label>
                <input type="number" id="MobileNo" >

                <label for="Email">Email <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a valid email id (Example: name@gmail.com)</span>
                    </span>
                </label>
                <input type="email" id="Email" required>
            </div>

            <!-- Row 4 -->
            <div class="stackinputs">
                <label for="Password">Password <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Password must contain at least 8 characters.</span>
                    </span>
                </label>
                <input type="password" id="Password" minlength="8" required>

                <label for="DOB">DOB <span class="required">*</span>
                    <span class="info-icon" >ⓘ
                        <span class="tooltip">Please select the user's date of birth.</span>
                    </span>
                </label>
                <input type="date" id="DOB" required>
            </div>

            <!-- Row 5 -->
            <div class="stackinputs">
                <label for="Address">Address</label>
                <input type="text" id="Address">

                <label for="Qualification">Qualification</label>
                <input type="text" id="Qualification">
            </div>

            <!-- Row 6 -->
            <div class="stackinputs">
                <label for="JoiningDate">Joining Date</label>
                <input type="date" id="JoiningDate">

                <label for="Gender">Gender</label>
                <select id="Gender">
                    <option value="">--Select--</option>
                    <option>Female</option>
                    <option>Male</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

<script src="js/db-api.js"></script>
<script src="js/users.js"></script>

</body>
</html>
