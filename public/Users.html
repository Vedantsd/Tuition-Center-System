<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>

</head>

<body>

<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Users Master Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="UserID">
                    User ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique numerical value.</span>
                    </span>
                </label>

                <div class="id-find-group">
                    <input type="number" id="UserID" required class="short-input" readonly>
                    <div class="mode-toggle" id="modeToggle">
                        <button type="button" class="mode-btn" id="newModeBtn">New</button>
                        <button type="button" class="mode-btn" id="findModeBtn">Find</button>
                    </div>
                </div>

                <div></div>

                <label for="UserType">
                    User Type <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the appropriate user type.</span>
                    </span>
                </label>

                <select id="UserType" required>
                    <option value="">--Select User Type--</option>
                </select>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="FirstName">
                    First Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the user's first name.</span>
                    </span>
                </label>

                <input type="text" id="FirstName" required>

                <div></div>

                <label for="LastName">
                    Last Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the user's last name.</span>
                    </span>
                </label>

                <input type="text" id="LastName" required>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="MobileNo">
                    Mobile No.
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the mobile number.</span>
                    </span>
                </label>

                <input type="number" id="MobileNo" class="short-input">

                <div></div>

                <label for="Email">
                    Email <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a valid email address.</span>
                    </span>
                </label>

                <input type="email" id="Email" required>

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="Password">
                    Password <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Password must contain at least 8 characters.</span>
                    </span>
                </label>

                <input type="password" id="Password" minlength="8" required>

                <div></div>

                <label for="DOB">
                    DOB <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the user's date of birth.</span>
                    </span>
                </label>

                <input type="date" id="DOB" class="short-input" required>

            </div>

            <!-- Row 5 -->
            <div class="stackinputs">

                <label for="Address">
                    Address
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the residential address.</span>
                    </span>
                </label>

                <input type="text" id="Address">

                <div></div>

                <label for="Qualification">
                    Qualification
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the qualification.</span>
                    </span>
                </label>

                <input type="text" id="Qualification">

            </div>

            <!-- Row 6 -->
            <div class="stackinputs">

                <label for="JoiningDate">
                    Joining Date
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the joining date.</span>
                    </span>
                </label>

                <input type="date" id="JoiningDate" class="short-input">

                <div></div>

                <label for="Gender">
                    Gender
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the gender.</span>
                    </span>
                </label>

                <select id="Gender" class="short-input">
                    <option value="">--Select--</option>
                </select>

            </div>

            <div class="button-container">
                <button type="button" class="btn save-btn">Save</button>
                <button type="button" class="btn nav-btn prevButton">◀</button>
                <button type="button" class="btn nav-btn nextButton">▶</button>
                <button type="button" class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>
</div>
<script src="js/db-api.js"></script>
<script src="js/users.js"></script>

</body>
</html>
