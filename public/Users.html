<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>

</head>

<body>

<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Users Master Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="UserID">
                    User ID <span class="required">*</span>
                    <span class="info-icon" data-info="Enter a unique numerical value.">ⓘ</span>
                </label>

                <div class="id-find-group">
                    <input type="number" id="UserID" required class="short-input" readonly>
                    <div class="mode-toggle" id="modeToggle">
                        <button type="button" class="mode-btn" id="newModeBtn">New</button>
                        <button type="button" class="mode-btn" id="findModeBtn">Find</button>
                    </div>
                </div>

                <div></div>

                <label for="UserType">
                    User Type <span class="required">*</span>
                    <span class="info-icon" data-info="Select the appropriate user type.">ⓘ</span>
                </label>

                <div class="user-field-wrapper">
                    <select id="UserType" required>
                        <option value="">--Select User Type--</option>
                    </select>
                </div>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="FirstName">
                    First Name <span class="required">*</span>
                </label>
                <div class="user-field-wrapper">
                <input type="text" id="FirstName" required>
                </div>

                <div></div>

                <label for="LastName">
                    Last Name <span class="required">*</span>
                </label>
                <div class="user-field-wrapper">
                <input type="text" id="LastName" required>
                </div>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="MobileNo">
                    Mobile No.
                </label>

                <input type="number" id="MobileNo" class="short-input">

                <div></div>

                <label for="Email">
                    Email <span class="required">*</span>
                    <span class="info-icon" data-info="Enter a valid email address.">ⓘ</span>
                </label>
                <div class="user-field-wrapper">
                <input type="email" id="Email" required>
                </div>

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="Password">
                    Password <span class="required">*</span>
                    <span class="info-icon" data-info="Password must contain at least 8 characters.">ⓘ</span>
                </label>
                <div class="user-field-wrapper">
                <input type="password" id="Password" minlength="8" required>
                </div>

                <div></div>

                <label for="DOB">
                    DOB <span class="required">*</span>
                </label>
                <div class="user-field-wrapper">
                <input type="date" id="DOB" class="short-input" required>
                </div>

            </div>

            <!-- Row 5 -->
            <div class="stackinputs">

                <label for="Address">
                    Address
                    <span class="info-icon" data-info="Enter the residential address.">ⓘ</span>
                </label>

                <input type="text" id="Address">

                <div></div>

                <label for="Qualification">
                    Qualification
                    <span class="info-icon" data-info="Enter the highest qualification.">ⓘ</span>
                </label>

                <input type="text" id="Qualification">

            </div>

            <!-- Row 6 -->
            <div class="stackinputs">

                <label for="JoiningDate">
                    Joining Date
                    <span class="info-icon" data-info="Select the joining date.">ⓘ</span>
                </label>

                <input type="date" id="JoiningDate" class="short-input">

                <div></div>

                <label for="Gender">
                    Gender
                </label>

                <select id="Gender" class="short-input">
                    <option value="">--Select--</option>
                </select>

            </div>

            <div class="button-container">
                <button type="button" class="btn save-btn">Save</button>
                <button type="button" class="btn nav-btn prevButton">◀</button>
                <button type="button" class="btn nav-btn nextButton">▶</button>
                <button type="button" class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>
</div>

<script src="js/db-api.js"></script>
<script src="js/users.js"></script>

<div class="modal-overlay" id="infoModalOverlay">
    <div class="modal-box">
        <p id="infoModalText"></p>
        <button type="button" id="infoModalClose" class="btn nav-btn">Close</button>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <p id="confirmMessage">Are you sure you want to update this record?</p>
        <div class="modal-buttons">
            <button id="confirmYesBtn" class="btn confirm-yes-btn">Yes</button>
            <button id="confirmNoBtn" class="btn confirm-no-btn">No</button>
        </div>
    </div>
</div>

</body>
</html>
