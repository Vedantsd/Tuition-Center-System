<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>
</head>

<body>

    <div class="body">
        <div class="content">

            <div class="main">

                <div class="form">

                    <div class="main-title">
                        Tuition Centre System
                    </div>

                    <div class="sub-title">
                        Notifications Master Entry
                    </div>

                    <div id="statusMessage" class="status-message"></div>

                    <!-- Row 1 -->
                    <div class="stackinputs">

                        <label for="NotificationID">
                            Notification ID <span class="required">*</span>
                            <span class="info-icon" data-info="Enter a unique notification ID.">ⓘ</span>
                        </label>

                        <div class="id-find-group">
                            <input type="number" id="NotificationID" class="short-input" required readonly>

                            <div class="mode-toggle" id="modeToggle">
                                <button type="button" class="mode-btn" id="newModeBtn">New</button>
                                <button type="button" class="mode-btn" id="findModeBtn">Find</button>
                            </div>
                        </div>

                        <div></div>

                        <label for="TargetRole">
                            Target Role <span class="required">*</span>
                            <span class="info-icon" data-info="Select the target role.">ⓘ</span>
                        </label>

                        <div class="user-field-wrapper">
                            <select id="TargetRole" required>
                                <option value="">--Select Role--</option>
                            </select>
                        </div>

                    </div>

                    <!-- Row 2 -->
                    <div class="stackinputs">

                        <label for="Title">
                            Title <span class="required">*</span>
                            <span class="info-icon" data-info="Enter notification title.">ⓘ</span>
                        </label>

                        <div class="user-field-wrapper">
                            <input type="text" id="Title" required>
                        </div>

                    </div>

                    <!-- Row 3 -->
                    <div class="stackinputs">

                        <label for="Message">
                            Message <span class="required">*</span>
                            <span class="info-icon" data-info="Enter the notification message.">ⓘ</span>
                        </label>

                        <div class="user-field-wrapper">
                            <textarea id="Message" rows="6" required></textarea>
                        </div>

                    </div>

                    <div class="button-container">
                        <button type="button" class="btn save-btn">Save</button>
                        <button type="button" class="btn nav-btn prevButton">◀</button>
                        <button type="button" class="btn nav-btn nextButton">▶</button>
                        <button type="button" class="btn exit-btn">Exit</button>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="js/db-api.js"></script>
    <script src="js/notifications.js"></script>

    <div class="modal-overlay" id="infoModalOverlay">
        <div class="modal-box">
            <p id="infoModalText"></p>
            <button type="button" id="infoModalClose" class="btn nav-btn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <p id="confirmMessage">Are you sure you want to update this record?</p>
            <div class="modal-buttons">
                <button id="confirmYesBtn" class="btn confirm-yes-btn">Yes</button>
                <button id="confirmNoBtn" class="btn confirm-no-btn">No</button>
            </div>
        </div>
    </div>

</body>

</html>
