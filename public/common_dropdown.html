<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOV Master</title>

<link rel="stylesheet" href="styles/reuseable-design.css">
</head>

<body>

<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                LOV Master
            </div>

            <div id="msg" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="fieldName">
                    Field Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">
                            Enter the field name.
                        </span>
                    </span>
                </label>

                <div class="id-find-group">
                    <input type="text" id="fieldName" class="short-input">
                    <button
                        type="button"
                        id="modeButton"
                        class="btn find-btn"
                        onclick="mode_change()">
                        Find
                    </button>
                </div>

                <div></div>

                <label for="status">
                    Status <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">
                            Enter the status.
                        </span>
                    </span>
                </label>

                <input type="text" id="status">

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="optionValue">
                    Option Value <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">
                            Enter the option value.
                        </span>
                    </span>
                </label>

                <input type="text" id="optionValue">

                <div></div>

                <div></div>

                <div></div>

            </div>

            <div class="button-container">

                <button
                    type="button"
                    id="saveBtn"
                    class="btn save-btn"
                    onclick="save_data()">
                    Save
                </button>

                <button
                    type="button"
                    id="prevBtn"
                    class="btn nav-btn"
                    onclick="previous_data()">
                    ◀
                </button>

                <button
                    type="button"
                    id="nextBtn"
                    class="btn nav-btn"
                    onclick="next_data()">
                    ▶
                </button>

                <button
                    type="button"
                    id="exitBtn"
                    class="btn exit-btn"
                    onclick="exit_page()">
                    Exit
                </button>

            </div>

        </div>

    </div>

</div>
</div>

<script src="js/db-api.js"></script>
<script src="js/common_dropdown.js"></script>

</body>
</html>
