<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>

    <Style>

    .toggle-buttons{

    display:flex;
    border:2px solid #1a73e8;
    border-radius:10px;
    overflow:hidden;
    width:130px;

}

.toggle-btn{

    flex:1;
    padding:10px 0;
    border:none;
    background:white;
    color:#1a73e8;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;

}

.toggle-btn.active{

    background:#1a73e8;
    color:white;

} 

</Style>

</head>

<body>

<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Student Enrollment Transaction Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

           
            <div class="stackinputs">

                <label for="EnrollmentID">
                    Enrollment ID <span class="required">*</span>
                    <span class="info-icon" data-info="Enrollment ID should be unique.">ⓘ</span>
                </label>

                <div class="id-find-group">
                    <input type="number" id="EnrollmentID" class="short-input">
                    <div class="toggle-buttons">

                        <button type="button"
                                id="newBtn"
                                class="toggle-btn active">
                            New
                        </button>

                        <button type="button"
                                id="findBtn"
                                class="toggle-btn">
                            Find
                        </button>

                    </div>
                </div>

                <div></div>

                <label for="StudentID">
                   Student ID <span class="required">*</span>
                    <span class="info-icon" data-info="It will came From User Form">ⓘ</span>
                </label>
                <input type="number" id="StudentID" class="short-input">
                


            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="CourseID">
                    Course ID <span class="required">*</span>
                    <span class="info-icon" data-info="It will Came from Course Form">ⓘ</span>
                </label>
                <input type="number" id="CourseID" class="short-input">
                

                <div></div>

                <label for="BatchID">
                    Batch ID  <span class="required">*</span>
                    <span class="info-icon" data-info="It Will came from Batch Form">ⓘ</span>
                </label>
                
                <input type="number" id="BatchID" class="short-input">

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="AdmissionDate">
                    Admission Date <span class="required">*</span>
                    <span class="info-icon" data-info="When you get Addmited in course">ⓘ</span>
                </label>
                <input type="date" id="AdmissionDate" class="short-input">
                

                <div></div>

                <label for="Status">
                    Status <span class="required">*</span>
                    <span class="info-icon" data-info="It can be Active/Inactive">ⓘ</span>
                    
                    
                </label>
                <input type="text" id="Status" class="short-input" required>
                

            </div>
        </div>
    </div>
</div>
</div>

<script src="js/db-api.js"></script>
<script src="js/courses.js"></script>

</body>
</html>
