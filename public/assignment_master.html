<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>
<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Assignment Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="AssignmentID">
                    Assignment ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique assignment ID.</span>
                    </span>
                </label>
                <div class="id-find-group">
                    <input class="short-input" type="number" id="AssignmentID" readonly required>
                    <button type="button" class="btn find-btn" id="findAssignmentBtn">Find</button>
                </div>

                <div></div>

                <label for="Title">
                    Title <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the assignment title.</span>
                    </span>
                </label>
                <input type="text" id="Title" required>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="BatchID">
                    Batch ID
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the batch ID for this assignment.</span>
                    </span>
                </label>
                <input class="short-input" type="number" id="BatchID" readonly>

                <div></div>

                <label for="DueDate">
                    Due Date <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the assignment due date.</span>
                    </span>
                </label>
                <input type="date" id="DueDate" required>

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn previous-btn">◀</button>
                <button class="btn next-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>
<!-- Batch Popup -->
<div id="batchPopup" class="popup">

    <div class="popup-content">

        <div class="popup-header">
            <span>Select Batch</span>
            <button type="button" onclick="closeBatchPopup()">✖</button>
        </div>

        <table id="batchTable" class="popup-table">

            <thead>
                <tr>
                    <th>Batch ID</th>
                    <th>Batch Name</th>
                </tr>
            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>
</div>
</div>
<script src="js/db-api.js"></script>
<script src="js/assignment_master.js"></script>
</body>
</html>
