<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
<style>
.assignment-nav-btn {
    background: #6C4CF1;
    color: white;
}

.assignment-nav-btn:hover {
    background: #5535d6;
}
</style>
<style>

.mode-toggle {
    display: flex;
    height: 52px;
    border: 2px solid #6C4CF1;
    border-radius: 12px;
    overflow: hidden;
    flex: none;
}

.mode-btn {
    border: none;
    background: white;
    color: #6C4CF1;
    padding: 0 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.mode-btn + .mode-btn {
    border-left: 1px solid #6C4CF1;
}

.mode-btn:hover {
    background: #6C4CF1;
    color: white;
}

</style>
<style>

.assignment-mode-toggle {
    display: flex;
    height: 52px;
    border: 2px solid #1677ff;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
}

.assignment-mode-btn {
    border: none;
    background: #ffffff;
    color: #1677ff;
    padding: 0 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.assignment-mode-btn + .assignment-mode-btn {
    border-left: 1px solid #1677ff;
}

.assignment-mode-btn.active {
    background: #1677ff;
    color: #ffffff;
}

</style>
</head>

<body>
<div class="body">
<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Assignment Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="AssignmentID" class="assignment-id-label">
                    Assignment ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a existing assignment ID.</span>
                    </span>
                </label>
                <div class="id-find-group">

    <input class="short-input"
           type="number"
           id="AssignmentID"
           readonly
           required>

    <div class="assignment-mode-toggle">

        <button type="button"
                class="assignment-mode-btn active"
                id="newModeBtn">
            New
        </button>

        <button type="button"
                class="assignment-mode-btn"
                id="findModeBtn">
            Find
        </button>

    </div>

</div>

                <div></div>

                <label for="Title">
                    Title <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the assignment title.</span>
                    </span>
                </label>
                <input type="text" id="Title" required>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="BatchID">
                    Batch ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the batch ID for this assignment.</span>
                    </span>
                </label>
                <select class="short-input" id="BatchID">
                    <option value="">Select Batch</option>
                </select>

                <div></div>

                <label for="DueDate">
                    Due Date <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the assignment due date.</span>
                    </span>
                </label>
                <input class="short-input" type="date" id="DueDate" required>

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn assignment-nav-btn previous-btn">◀</button>
                <button class="btn nav-btn assignment-nav-btn next-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>
</div>
</div>
<script src="js/db-api.js"></script>
<script src="js/assignment_master.js"></script>
</body>
</html>
