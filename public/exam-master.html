<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Exam Master
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="ExamID">
                    Exam ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique exam ID.</span>
                    </span>
                </label>
                <input type="number" id="ExamID" required>

                <div></div>

                <label for="ExamName">
                    Exam Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the exam name.</span>
                    </span>
                </label>
                <input type="text" id="ExamName" required>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="CourseID">
                    Course ID
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the associated course ID.</span>
                    </span>
                </label>
                <input type="number" id="CourseID">

                <div></div>

                <label for="TotalMarks">
                    Total Marks <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the maximum marks for the exam.</span>
                    </span>
                </label>
                <input type="number" id="TotalMarks" required>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="ExamDate">
                    Exam Date <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the date of the examination.</span>
                    </span>
                </label>
                <input type="date" id="ExamDate" required>

                <div></div>

                <label></label>
                <input type="text" disabled style="visibility:hidden;">

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
