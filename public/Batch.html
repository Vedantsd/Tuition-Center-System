<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>Tuition Centre System</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">

            <div class="main-title">
                Tuition Centre System
            </div>

            <div class="sub-title">
                Batch Entry
            </div>

            <div id="statusMessage" class="status-message"></div>

            <!-- Row 1 -->
            <div class="stackinputs">

                <label for="BatchID">
                    Batch ID <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter a unique batch ID.</span>
                    </span>
                </label>
                <input type="number" id="BatchID" required>

                <div></div>

                <label for="BatchName">
                    Batch Name <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the name of the batch.</span>
                    </span>
                </label>
                <input type="text" id="BatchName" required>

            </div>

            <!-- Row 2 -->
            <div class="stackinputs">

                <label for="CourseID">
                    Course ID
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the associated course ID.</span>
                    </span>
                </label>
                <input type="text" id="CourseID">

                <div></div>

                <label for="Classroom">
                    Classroom <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the classroom assigned to this batch.</span>
                    </span>
                </label>
                <input type="text" id="Classroom" required>

            </div>

            <!-- Row 3 -->
            <div class="stackinputs">

                <label for="StartTime">
                    Start Time
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the batch start time.</span>
                    </span>
                </label>
                <input type="time" id="StartTime">

                <div></div>

                <label for="EndTime">
                    End Time
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the batch end time.</span>
                    </span>
                </label>
                <input type="time" id="EndTime">

            </div>

            <!-- Row 4 -->
            <div class="stackinputs">

                <label for="DaysOfWeek">
                    Days of Week <span class="required">*</span>
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the scheduled days (e.g., Monday, Wednesday, Friday).</span>
                    </span>
                </label>
                <input type="text" id="DaysOfWeek" required>

                <div></div>

                <label for="FacultyID">
                    Faculty ID
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Enter the faculty ID assigned to this batch.</span>
                    </span>
                </label>
                <input type="number" id="FacultyID">

            </div>

            <!-- Row 5 -->
            <div class="stackinputs">

                <label for="StartDate">
                    Start Date
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the batch start date.</span>
                    </span>
                </label>
                <input type="date" id="StartDate">

                <div></div>

                <label for="EndDate">
                    End Date
                    <span class="info-icon">ⓘ
                        <span class="tooltip">Select the batch end date.</span>
                    </span>
                </label>
                <input type="date" id="EndDate">

            </div>

            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
