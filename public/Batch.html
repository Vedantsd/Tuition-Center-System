<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>

    <style>

        .multi-select {
            position: relative;
            min-width: 0;
            max-width: 100%;
        }

        .multi-select-toggle {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.4;
            text-align: left;
            cursor: pointer;
            color: #222;
            box-sizing: border-box;
            overflow: hidden;
        }

        .multi-select-toggle:focus {
            outline: 2px solid #5535d6;
            outline-offset: 1px;
        }

        .multi-select-label {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            padding-right: 8px;
        }

        .multi-select-caret {
            color: #666;
            flex-shrink: 0;
        }

        .multi-select-panel {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            max-height: 220px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .multi-select-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .multi-select-option:hover {
            background: #f2f0fb;
        }

        .multi-select-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            flex-shrink: 0;
            cursor: pointer;
        }

    </style>

</head>

<body>
    <div class="body">
    <div class="content">
        <div class="main">
            <div class="form">

                <div class="main-title">
                    Tuition Centre System
                </div>

                <div class="sub-title">
                    Batch Master
                </div>

                <div id="statusMessage" class="status-message"></div>

                <!-- Row 1 -->
                <div class="stackinputs">

                    <label for="BatchID" class="assignment-id-label">
                        Batch ID <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter an existing batch ID.</span>
                        </span>
                    </label>

                    <div class="id-find-group">

                        <input class="short-input"
                               type="number"
                               id="BatchID"
                               readonly
                               required>

                        <div class="assignment-mode-toggle">

                            <button type="button"
                                    class="assignment-mode-btn active"
                                    id="newModeBtn">
                                New
                            </button>

                            <button type="button"
                                    class="assignment-mode-btn"
                                    id="findModeBtn">
                                Find
                            </button>

                        </div>

                    </div>

                    <div></div>

                    <label for="BatchName">
                        Batch Name <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter a unique name to identify this batch.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <input type="text" id="BatchName" required>
                    </div>

                </div>

                <!-- Row 2 -->
                <div class="stackinputs">

                    <label for="CourseID">
                        Course <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the course this batch belongs to.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <select class="short-input" id="CourseID">
                            <option value="">Select Course</option>
                        </select>
                    </div>

                    <div></div>

                    <label for="Classroom">
                        Classroom <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the room where this batch will be held. Only active rooms are shown.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <select class="short-input" id="Classroom" required>
                            <option value="">Select Classroom</option>
                        </select>
                    </div>

                </div>

                <!-- Row 3 -->
                <div class="stackinputs">

                    <label for="StartTime">
                        Start Time
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the time this batch starts.</span>
                        </span>
                    </label>
                    <input type="time" id="StartTime">

                    <div></div>

                    <label for="EndTime">
                        End Time
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the time this batch ends.</span>
                        </span>
                    </label>
                    <input type="time" id="EndTime">

                </div>

                <!-- Row 4 -->
                <div class="stackinputs">

                    <label for="DaysOfWeekToggle">
                        Days Of Week <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Click to select the days this batch meets.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">

                        <div class="multi-select" id="DaysOfWeekMultiSelect">

                            <button type="button"
                                    class="multi-select-toggle"
                                    id="DaysOfWeekToggle">
                                <span class="multi-select-label" id="DaysOfWeekLabel">
                                    Select Days
                                </span>
                                <span class="multi-select-caret">▾</span>
                            </button>

                            <div class="multi-select-panel" id="DaysOfWeekPanel">
                            </div>

                        </div>

                        <input type="hidden" id="DaysOfWeek" required>

                    </div>

                    <div></div>

                    <label for="FacultyID">
                        Faculty
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the faculty member assigned to this batch.</span>
                        </span>
                    </label>
                    <select id="FacultyID">
                        <option value="">Select Faculty</option>
                    </select>

                </div>

                <!-- Row 5 -->
                <div class="stackinputs">

                    <label for="StartDate">
                        Start Date
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the date this batch starts.</span>
                        </span>
                    </label>
                    <input type="date" id="StartDate">

                    <div></div>

                    <label for="EndDate">
                        End Date
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the date this batch ends.</span>
                        </span>
                    </label>
                    <input type="date" id="EndDate">

                </div>

                <div class="button-container">
                    <button type="button" class="btn save-btn">Save</button>
                    <button type="button" class="btn nav-btn prevButton">◀</button>
                    <button type="button" class="btn nav-btn nextButton">▶</button>
                    <button type="button" class="btn exit-btn">Exit</button>
                </div>

            </div>
        </div>
    </div>
</div>
    <script src="js/db-api.js"></script>
    <script src="js/batches.js"></script>
</body>

</html>
