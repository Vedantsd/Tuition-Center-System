<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>

    <style>
        .id-container{
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        #BatchID{
            flex: 1;
        }

        #PrevBtn,
        #NextBtn{
            background: #5535d6;
            color: white;
            border: none;
        }

        #PrevBtn:hover,
        #NextBtn:hover{
            background: #3d325d;
        }
    </style>
</head>

<body>
    <div class="body">
    <div class="content">
        <div class="main">
            <div class="form">

                <div class="main-title">
                    Tuition Centre System
                </div>

                <div class="sub-title">
                    Batch Entry
                </div>

                <div id="statusMessage" class="status-message"></div>

                <!-- Row 1 -->
                <div class="stackinputs">
                    <label for="BatchID">
                        Batch ID
                        <span class="info-icon">ⓘ
                            <span class="tooltip">System-generated unique identifier for this batch.</span>
                        </span>
                        <span class="required">*</span>
                    </label>

                    <div class="id-container">

    <input type="number" id="BatchID" readonly>

    <button
        type="button"
        id="FindBtn"
        class="btn mode-btn">
        Find
    </button>

    <button
        type="button"
        id="NewBtn"
        class="btn mode-btn active">
        New
    </button>

</div>

                    <div></div>

                    <label for="BatchName">
                        Batch Name
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter a unique name to identify this batch.</span>
                        </span>
                        <span class="required">*</span>
                    </label>
                    <input type="text" id="BatchName" required>
                </div>

                <!-- Row 2 -->
                <div class="stackinputs">
                    <label for="CourseID">
                        Course
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the course this batch belongs to.</span>
                        </span>
                        <span class="required">*</span>
                    </label>
                    <select id="CourseID">
                        <option value="">--Select Course--</option>
                    </select>

                    <div></div>

                    <label for="Classroom">
                        Classroom
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter the classroom or room number where this batch will be held.</span>
                        </span>
                        <span class="required">*</span>
                    </label>
                    <input type="text" id="Classroom" required>
                </div>

                <!-- Row 3 -->
                <div class="stackinputs">
                    <label for="StartTime">
                        Start Time
                    </label>
                    <input type="time" id="StartTime">

                    <div></div>

                    <label for="EndTime">
                        End Time
                    </label>
                    <input type="time" id="EndTime">
                </div>

                <!-- Row 4 -->
                <div class="stackinputs">
                    <label for="DaysOfWeek">
                        Days Of Week
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter the days this batch meets, e.g. Monday, Wednesday, Friday.</span>
                        </span>
                        <span class="required">*</span>
                    </label>
                    <input type="text" id="DaysOfWeek" >

                    <div></div>

                    <label for="FacultyID">
                        Faculty
                    </label>
                    <select id="FacultyID">
                        <option value="">--Select Faculty--</option>
                    </select>
                </div>

                <!-- Row 5 -->
                <div class="stackinputs">
                    <label for="StartDate">
                        Start Date
                    </label>
                    <input type="date" id="StartDate">

                    <div></div>

                    <label for="EndDate">
                        End Date
                    </label>
                    <input type="date" id="EndDate">
                </div>

                <div class="button-container">
                    <button type="button" id="SaveBtn" class="btn save-btn">Save</button>
                    <button type="button" class="btn prev-btn" id="PrevBtn">◀</button>
                    <button type="button" class="btn next-btn" id="NextBtn">▶</button>
                    <button type="button" class="btn exit-btn">Exit</button>
                </div>

            </div>
        </div>
    </div>
</div>
    <script src="js/db-api.js"></script>
    <script src="js/batches.js"></script>
</body>

</html>
