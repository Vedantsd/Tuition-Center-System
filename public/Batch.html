<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reuseable-design.css">
    <title>Tuition Centre System</title>
</head>

<body>
    <div class="body">
    <div class="content">
        <div class="main">
            <div class="form">

                <div class="main-title">
                    Tuition Centre System
                </div>

                <div class="sub-title">
                    Batch Master
                </div>

                <div id="statusMessage" class="status-message"></div>

                <!-- Row 1 -->
                <div class="stackinputs">

                    <label for="BatchID" class="assignment-id-label">
                        Batch ID <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter an existing batch ID.</span>
                        </span>
                    </label>

                    <div class="id-find-group">

                        <input class="short-input"
                               type="number"
                               id="BatchID"
                               readonly
                               required>

                        <div class="assignment-mode-toggle">

                            <button type="button"
                                    class="assignment-mode-btn active"
                                    id="newModeBtn">
                                New
                            </button>

                            <button type="button"
                                    class="assignment-mode-btn"
                                    id="findModeBtn">
                                Find
                            </button>

                        </div>

                    </div>

                    <div></div>

                    <label for="BatchName">
                        Batch Name <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter a unique name to identify this batch.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <input type="text" id="BatchName" required>
                    </div>

                </div>

                <!-- Row 2 -->
                <div class="stackinputs">

                    <label for="CourseID">
                        Course <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Select the course this batch belongs to.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <select class="short-input" id="CourseID">
                            <option value="">Select Course</option>
                        </select>
                    </div>

                    <div></div>

                    <label for="Classroom">
                        Classroom <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter the classroom or room number where this batch will be held.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <input type="text" id="Classroom" required>
                    </div>

                </div>

                <!-- Row 3 -->
                <div class="stackinputs">

                    <label for="StartTime">
                        Start Time
                    </label>
                    <input type="time" id="StartTime">

                    <div></div>

                    <label for="EndTime">
                        End Time
                    </label>
                    <input type="time" id="EndTime">

                </div>

                <!-- Row 4 -->
                <div class="stackinputs">

                    <label for="DaysOfWeek">
                        Days Of Week <span class="required">*</span>
                        <span class="info-icon">ⓘ
                            <span class="tooltip">Enter the days this batch meets, e.g. Monday, Wednesday, Friday.</span>
                        </span>
                    </label>
                    <div class="assignment-field-wrapper">
                        <input type="text" id="DaysOfWeek" required>
                    </div>

                    <div></div>

                    <label for="FacultyID">
                        Faculty
                    </label>
                    <select id="FacultyID">
                        <option value="">Select Faculty</option>
                    </select>

                </div>

                <!-- Row 5 -->
                <div class="stackinputs">

                    <label for="StartDate">
                        Start Date
                    </label>
                    <input type="date" id="StartDate">

                    <div></div>

                    <label for="EndDate">
                        End Date
                    </label>
                    <input type="date" id="EndDate">

                </div>

                <div class="button-container">
                    <button class="btn save-btn">Save</button>
                    <button class="btn nav-btn assignment-nav-btn previous-btn">◀</button>
                    <button class="btn nav-btn assignment-nav-btn next-btn">▶</button>
                    <button class="btn exit-btn">Exit</button>
                </div>

            </div>
        </div>
    </div>
</div>
    <script src="js/db-api.js"></script>
    <script src="js/batches.js"></script>
</body>

</html>
