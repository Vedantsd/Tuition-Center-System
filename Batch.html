<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>PaperLeak Academy</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">
            <div class="main-title">
                Tuition Centre System
            </div>

            <!-- FORM NAME -->
            <div class="sub-title">
                Batch Entry
            </div>

            <!-- ADD OR REMOVE FIELDS BELOW AS NEEDED -->

           <div class="stackinputs">
                    <div class="form-group">
                        <label for="Batch ID">Batch ID</label>
                        <input type="number" id="Batch ID" required>
                    </div>

                    <div class="form-group">
                        <label for="Batch Name">Batch Name</label>
                        <input type="text" id="Batch Name" required>
                    </div>
                </div>
                
                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Course Id">Course Id</label>
                        <input type="text" id="Course Id" >
                    </div>

                    <div class="form-group">
                        <label for="Classroom">Classroom</label>
                        <input type="text" id="classroom" required>
                    </div>
                </div>
                
            

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Start Time">Start Time</label>
                        <input type="time" id="Start Time" >
                    </div>

                    <div class="form-group">
                        <label for="End Time">End Time</label>
                        <input type="time" id="End Time" >
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Days of week">Days of week </label>
                        <input type="text" id="Days of week"  requried>
                    </div>

                    <div class="form-group">
                        <label for="Faculty_ID">Faculty ID</label>
                        <input type="number" id="Faculty ID" >
                    </div>
                </div>

                <div class="stackinputs">
                    <div class="form-group">
                        <label for="Start Date">Start Date</label>
                        <input type="date" id="Start Date" >
                    </div>

                    <div class="form-group">
                        <label for="End Date">End Date</label>
                        <input type="date" id="End Date" >
                    </div>
                </div>


            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
