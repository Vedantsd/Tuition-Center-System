<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/reuseable-design.css">
<title>PaperLeak Academy Form Template</title>
</head>

<body>

<div class="content">

    <div class="main">

        <div class="form">
            <div class="main-title">
                PaperLeak Academy
            </div>

            <div class="sub-title">
                Exam Master
            </div>


            <div class="stackinputs">

                <div class="form-group">
                    <label>Exam id</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Exam name</label>
                    <input type="text">
                </div>

            </div>

            <div class="stackinputs">

                <div class="form-group">
                    <label>Course id</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Total marks</label>
                    <input type="text">
                </div>

            </div>

            <div class="full-width form-group">
                <label>Exam date</label>
                <input type="date">
            </div>


            <div class="button-container">
                <button class="btn save-btn">Save</button>
                <button class="btn nav-btn">◀</button>
                <button class="btn nav-btn">▶</button>
                <button class="btn exit-btn">Exit</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
